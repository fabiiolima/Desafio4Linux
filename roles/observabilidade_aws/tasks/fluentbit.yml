---
- name: Adicionar repositório Helm do Fluent Bit
  kubernetes.core.helm_repository:
    name: fluent
    repo_url: https://fluent.github.io/helm-charts

- name: Instalar ou atualizar Fluent Bit na AWS
  kubernetes.core.helm:
    kubeconfig: "{{ monitoring_kubeconfig }}"
    name: fluent-bit
    chart_ref: fluent/fluent-bit
    release_namespace: monitoring
    create_namespace: true
    release_state: present
    wait: true
    wait_timeout: 10m
    values:
      config:
        outputs: |
          [OUTPUT]
              Name opensearch
              Match kube.*
              Host opensearch-cluster-master.monitoring.svc.cluster.local
              Port 9200
              Index fluentbit
              Logstash_Format On
              Logstash_Prefix fluentbit
              Suppress_Type_Name On
              Replace_Dots On
              Retry_Limit False
