- name: Adicionar repositório do Prometheus
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts
  check_mode: no

- name: Adicionar repositório do Grafana
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts
  check_mode: no

- name: Adicionar repositório do Zabbix
  kubernetes.core.helm_repository:
    name: zabbix-chart
    repo_url: https://zabbix-community.github.io/helm-zabbix
  check_mode: no

- name: Adicionar repositório do OpenSearch
  kubernetes.core.helm_repository:
    name: opensearch
    repo_url: https://opensearch-project.github.io/helm-charts
  check_mode: no

- name: Adicionar repositório do Bitnami
  kubernetes.core.helm_repository:
    name: bitnami
    repo_url: https://charts.bitnami.com/bitnami
  check_mode: no

- name: Atualizar os repositórios do Helm
  command: helm repo update
  changed_when: false
  check_mode: no
