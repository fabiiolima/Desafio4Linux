---
- name: Gerar valores do Prometheus
  ansible.builtin.template:
    src: "{{ role_path }}/templates/prometheus-values.yml.j2"
    dest: /tmp/prometheus-values.yml
    mode: '0600'

- name: Instalar ou atualizar Prometheus na AWS
  kubernetes.core.helm:
    kubeconfig: "{{ monitoring_kubeconfig }}"
    name: prometheus
    chart_ref: prometheus-community/prometheus
    release_namespace: monitoring
    create_namespace: true
    release_state: present
    values_files: [/tmp/prometheus-values.yml]
    wait: true
    wait_timeout: 10m
